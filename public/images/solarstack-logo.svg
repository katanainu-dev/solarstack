<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!-- Icon: sun/lightbulb -->
  <g transform="translate(8, 4)">
    <!-- Sun rays (top half) -->
    <path d="M32 6 L32 2" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
    <path d="M44.5 9.5 L47.3 6.7" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
    <path d="M19.5 9.5 L16.7 6.7" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
    <path d="M51 22 L55 22" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
    <path d="M13 22 L9 22" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
    <!-- Semicircle top -->
    <path d="M14 30 A18 18 0 0 1 50 30" fill="#FFB800"/>
    <!-- Bulb body lower (trapezoid feel) -->
    <path d="M16 30 L16 36 Q16 40 20 40 L44 40 Q48 40 48 36 L48 30 Z" fill="#FFB800"/>
    <!-- Base bars -->
    <rect x="20" y="42" width="24" height="5" rx="2.5" fill="#FFB800"/>
    <rect x="22" y="50" width="20" height="5" rx="2.5" fill="#FFB800"/>
    <rect x="25" y="58" width="14" height="5" rx="2.5" fill="#FFB800"/>
  </g>

  <!-- Wordmark: Solar (dark) + Stack (yellow) -->
  <text x="82" y="53" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" letter-spacing="-1" fill="#1a1f2e">Solar</text>
  <text x="171" y="53" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" letter-spacing="-1" fill="#FFB800">Stack</text>
</svg>
